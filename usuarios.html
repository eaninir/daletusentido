<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo de API con Fetch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h1 class="mb-4 text-center">Listado de Usuarios (Desde API)</h1>

        <div id="loader" class="text-center my-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Obteniendo datos de la API...</p>
        </div>

        <div id="error-alert" class="alert alert-danger d-none" role="alert">
            <strong>¡Ups! Algo salió mal:</strong> <span id="error-message"></span>
        </div>

        <div id="usuarios-container" class="row g-4">
            </div>
    </div>

    <script src="assets/app.json"></script>
</body>
</html>
